<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Fylo data storage component</title>

 
</head>
<body>
  <img src="images/bg-desktop.png" alt="" class="bg">
<main class="container">
          <section class="left-card">
            <img src="images/logo.svg" alt="" class="logo">

            <div class="left-images">
              <img src="images/icon-document.svg" alt="">
              <img src="images/icon-folder.svg" alt="">
              <img src="images/icon-upload.svg" alt="">
            </div>
          </section>

          <section class="right-card">
            <p> You’ve used <span class="value">815 GB</span>  of your storage</p>
              <div class="progress-bar">
                <div class="progress"></div>
              </div>
              <div class="range">
                <span class="value">0 GB</span> 
               <span class="value"> 1000 GB</span>
              </div>
              
              <div class="bubble">
                <span class="big">185</span>
                <span class="small">GB LEFT</span>
            </div>
          </section>
</main>
  

 

  
  
  
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
